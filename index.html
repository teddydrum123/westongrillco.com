<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weston Grill Co — Weston, CT</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:#0f1f3d;
  --orange:#2d6a4f;
  --cream:#f5f0e8;
  --text:#0f1f3d;
}

body {
  font-family: Lato, sans-serif;
  background: var(--cream);
  color: var(--text);
}

/* ===== NAV ===== */
nav {
  background: var(--navy);
  color: white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
}

.logo { cursor:pointer; font-weight:700; }
.nav-links a { color:white; margin:0 10px; cursor:pointer; }

/* ===== PAGES ===== */
.page { display:none; padding:20px; }
.page.active { display:block; }

/* ===== BUTTONS ===== */
.btn-primary {
  background: var(--orange);
  color:white;
  padding:10px 16px;
  border:none;
  cursor:pointer;
}

/* ===== TRACKER ===== */
table { width:100%; margin-top:20px; border-collapse:collapse; }
td,th { border:1px solid #ddd; padding:8px; }
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo" onclick="goPage('home')">Weston Grill Co</div>
  <div class="nav-links">
    <a onclick="goPage('home')">Home</a>
    <a onclick="goPage('book')">Book</a>
    <a onclick="goPage('contact')">Contact</a>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <h1>Welcome to Weston Grill Co</h1>
  <button class="btn-primary" onclick="goPage('book')">Book Now</button>
</div>

<!-- BOOK -->
<div id="page-book" class="page">
  <h2>Book Appointment</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="addr" placeholder="Address"><br><br>
  <input id="date" type="date"><br><br>

  <button class="btn-primary" onclick="submitBooking()">Submit</button>
</div>

<!-- CONTACT -->
<div id="page-contact" class="page">
  <h2>Contact</h2>
  <p>Call or text: (203) 313-7538</p>
</div>

<!-- TRACKER -->
<div id="page-tracker" class="page">
  <h2>Tracker</h2>
  <button onclick="openTracker()">Unlock</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Date</th>
        <th>Status</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
let unlocked = false;

/* NAV */
function goPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
}

/* BOOKING */
function submitBooking(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const addr = document.getElementById("addr").value;
  const date = document.getElementById("date").value;

  if(!name || !phone || !addr || !date){
    alert("Fill all fields");
    return;
  }

  bookings.push({
    id:Date.now(),
    name, addr, date,
    status:"upcoming"
  });

  localStorage.setItem("bookings", JSON.stringify(bookings));
  alert("Booked!");
}

/* TRACKER */
function openTracker(){
  const pw = prompt("Password:");
  if(pw !== "Teddy0315") return alert("Wrong password");
  unlocked = true;
  goPage("tracker");
  render();
}

function deleteBooking(id){
  bookings = bookings.filter(b=>b.id !== id);
  localStorage.setItem("bookings", JSON.stringify(bookings));
  render();
}

function render(){
  if(!unlocked) return;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = bookings.map(b=>`
    <tr>
      <td>${b.name}</td>
      <td>${b.addr}</td>
      <td>${b.date}</td>
      <td>${b.status}</td>
      <td><button onclick="deleteBooking(${b.id})">X</button></td>
    </tr>
  `).join("");
}
</script>

</body>
</html>
